<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理画面】イベント管理・新規作成</title>
    <style>
        :root { --bg-gradient: radial-gradient(circle at 10% 10%, #f0fdf4 0%, #e0f2fe 50%, #faf5ff 100%); --text-main: #0f172a; --card-bg: #ffffff; --primary-color: #0284c7; --border-color: #cbd5e1; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 40px 20px; background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .admin-container { width: 100%; max-width: 580px; box-sizing: border-box; }
        .admin-card { background: var(--card-bg); padding: 35px 30px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.7); }
        .badge { display: inline-block; background-color: #ffedd5; color: #ea580c; font-size: 11px; font-weight: bold; padding: 4px 12px; border-radius: 12px; margin-bottom: 10px; }
        h2 { font-size: 21px; margin: 0 0 25px 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; color: #1e293b; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #475569; }
        .form-group input[type="text"], .form-group input[type="date"], .form-group input[type="time"], .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; background-color: #f8fafc; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #38bdf8; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(56,189,248,0.15); }
        .form-group textarea { text-align: left; }
        .time-range { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(2,132,199,0.2); margin-top: 10px; transition: all 0.2s; }
        .submit-btn:disabled { background: #94a3b8 !important; cursor: not-allowed; box-shadow: none; }
        .loading { display: none; text-align: center; font-size: 14px; color: var(--primary-color); font-weight: bold; margin-top: 15px; }
        .hidden { display: none !important; }

        /* アニメーション選択ボタン */
        .anim-submit-section { margin-top: 25px; border-top: 1px dashed var(--border-color); padding-top: 20px; }
        .anim-submit-section-title { font-size: 13px; font-weight: bold; color: #1e293b; margin-bottom: 12px; display: block; }
        .anim-btn-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .btn-anim-choice { padding: 14px 8px; border-radius: 12px; border: 1px solid transparent; font-size: 12px; font-weight: bold; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); transition: all 0.2s ease; }
        .btn-anim-choice:active { transform: scale(0.95); }
        .btn-anim-choice:disabled { background: #cbd5e1 !important; cursor: not-allowed; animation: none !important; }
        .btn-anim-choice span { font-size: 9px; font-weight: normal; opacity: 0.85; }

        .btn-anim-neon { background: linear-gradient(135deg, #ec4899 0%, #db2777 100%); animation: pulse-pink 1.5s infinite alternate; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 2px rgba(236,72,153,0.3); } 100% { box-shadow: 0 0 14px rgba(236,72,153,0.85); } }
        .btn-anim-slide { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
        .btn-anim-transform { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); animation: transform-jelly 1.8s infinite ease-in-out; }
        @keyframes transform-jelly { 0%, 100% { transform: scale(1,1); } 30% { transform: scale(1.06, 0.94); } 65% { transform: scale(0.94, 1.06); } }
        .btn-anim-theatrical { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); animation: theatrical-float 2.2s infinite ease-in-out; }
        @keyframes theatrical-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .btn-anim-confetti { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); animation: confetti-sparkle 1.2s infinite steps(2); }
        @keyframes confetti-sparkle { 0% { border-color: #38bdf8; } 100% { border-color: #f43f5e; } }
        .btn-anim-stardust { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); animation: stardust-glimmer 1.6s infinite alternate; }
        @keyframes stardust-glimmer { 0% { opacity: 0.75; filter: brightness(0.85); } 100% { opacity: 1; filter: brightness(1.25); box-shadow: 0 0 10px rgba(99,102,241,0.5); } }

        /* メール送信時刻設定 */
        .mail-time-section { margin-bottom: 20px; border: 1px solid #e0f2fe; border-radius: 14px; padding: 16px 14px; background: #f0f9ff; }
        .mail-time-title { font-size: 12px; font-weight: bold; color: #0369a1; margin-bottom: 12px; display: block; }
        .mail-time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .mail-time-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .mail-time-label { font-size: 11px; font-weight: bold; color: #475569; white-space: nowrap; }
        .mail-time-chip { padding: 7px 10px; border-radius: 10px; border: 1.5px solid #bae6fd; background: #ffffff; font-size: 12px; font-weight: bold; color: #0369a1; cursor: pointer; transition: all 0.15s; width: 100%; text-align: center; }
        .mail-time-chip:hover { border-color: #0284c7; background: #e0f2fe; }
        .mail-time-chip.fixed { color: #64748b; cursor: default; background: #f1f5f9; border-color: #e2e8f0; font-size: 11px; }
        .mail-time-select { width: 100%; padding: 6px 4px; border: 1.5px solid #0284c7; border-radius: 8px; font-size: 12px; font-weight: bold; color: #0369a1; background: #f0f9ff; cursor: pointer; }

        /* 削除完了パネル */
        .success-overlay { text-align: center; padding: 40px 20px; }
        .success-icon { font-size: 60px; color: #ef4444; margin-bottom: 20px; transform: scale(0); animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop-in { to { transform: scale(1); } }
    </style>
</head><body>
    <div class="admin-container" id="admin-main">

        <!-- セクション1: 新規作成 -->
        <div id="create-section" class="admin-card">
            <div class="badge">CREATE EVENT</div>
            <h2>新規イベント作成フォーム</h2>
            <form id="event-form" onsubmit="preventStandardSubmit(event)">
                <div class="form-group">
                    <label>イベント名</label>
                    <select id="event-name-sel" onchange="handleSelectChange('event-name-sel','event-name-new')">
                        <option value="">-- 読み込み中 --</option>
                    </select>
                    <input type="text" id="event-name-new" placeholder="新しいイベント名を入力" style="margin-top:8px; display:none;">
                </div>
                <div class="form-group"><label>開催年月日</label><input type="date" id="event-date" required></div>
                <div class="time-range">
                    <div class="form-group"><label>オープン時間</label><input type="time" id="open-time" value="19:00" required></div>
                    <div class="form-group"><label>スタート時間</label><input type="time" id="start-time" value="19:30" required></div>
                </div>
                <div class="form-group">
                    <label>開催場所</label>
                    <select id="event-venue-sel" onchange="handleSelectChange('event-venue-sel','event-venue-new')">
                        <option value="">-- 読み込み中 --</option>
                    </select>
                    <input type="text" id="event-venue-new" placeholder="新しい開催場所を入力" style="margin-top:8px; display:none;">
                </div>
                <div class="form-group">
                    <label>ゲスト名</label>
                    <select id="event-guest-sel" onchange="handleSelectChange('event-guest-sel','event-guest-new')">
                        <option value="">-- 読み込み中 --</option>
                    </select>
                    <input type="text" id="event-guest-new" placeholder="新しいゲスト名を入力" style="margin-top:8px; display:none;">
                </div>
                <div class="form-group">
                    <label style="color:#0284c7;">過去の詳細説明から選ぶ（テンプレート反映）</label>
                    <select id="detail-template-select" onchange="applyDetailTemplate()">
                        <option value="">-- 過去の説明文を反映させる場合は選択（任意） --</option>
                    </select>
                </div>
                <div class="form-group"><label>詳細入力欄（複数行入力可能）</label><textarea id="event-details" rows="5" placeholder="上のプルダウンから選ぶか、ここに新しく入力してください。"></textarea></div>

                <div class="form-group">
                    <label>「初めて参加される一般の方」欄の表示</label>
                    <select id="event-shownote">
                        <option value="有">有（申込画面・確認画面・メールに表示する）</option>
                        <option value="無">無（表示しない）</option>
                    </select>
                </div>

                <div class="anim-submit-section">
                    <!-- メール送信時刻設定 -->
                    <div class="mail-time-section">
                        <span class="mail-time-title">📧 自動返信メールの送信時刻</span>
                        <div class="mail-time-grid" id="mail-time-grid">
                            <div class="mail-time-item"><span class="mail-time-label">申込受付時</span><button class="mail-time-chip fixed">即時送信</button></div>
                            <div class="mail-time-item"><span class="mail-time-label">7日前</span><div id="mt-d7before"></div></div>
                            <div class="mail-time-item"><span class="mail-time-label">3日前</span><div id="mt-d3before"></div></div>
                            <div class="mail-time-item"><span class="mail-time-label">前日</span><div id="mt-d1before"></div></div>
                            <div class="mail-time-item"><span class="mail-time-label">当日</span><div id="mt-sameday"></div></div>
                            <div class="mail-time-item"><span class="mail-time-label">7日後</span><div id="mt-d7after"></div></div>
                        </div>
                    </div>

                    <span class="anim-submit-section-title">演出ボタンを押して確定：</span>
                    <div class="anim-btn-container">
                        <button type="button" onclick="submitWithAnimation('neon')" class="btn-anim-choice btn-anim-neon">⚡ネオン<span>レンズズーム</span></button>
                        <button type="button" onclick="submitWithAnimation('slide')" class="btn-anim-choice btn-anim-slide">↔スライド<span>横方向動</span></button>
                        <button type="button" onclick="submitWithAnimation('transform')" class="btn-anim-choice btn-anim-transform">🔄変形<span>モーフィング</span></button>
                        <button type="button" onclick="submitWithAnimation('theatrical')" class="btn-anim-choice btn-anim-theatrical">🎭シアター<span>ドロップ下降</span></button>
                        <button type="button" onclick="submitWithAnimation('confetti')" class="btn-anim-choice btn-anim-confetti">🎉紙吹雪<span>クラッカー</span></button>
                        <button type="button" onclick="submitWithAnimation('stardust')" class="btn-anim-choice btn-anim-stardust">✨宇宙<span>星空グリマー</span></button>
                    </div>
                </div>
                <div id="loading-msg" class="loading">Googleスプレッドシートに書き込み中...</div>
            </form>
        </div>

        <!-- セクション2: イベント削除 -->
        <div id="delete-section" class="admin-card" style="border-top: 4px solid #ef4444;">
            <div class="badge" style="background-color: #fee2e2; color: #ef4444;">DANGER ZONE</div>
            <h2>イベント削除管理</h2>
            <p style="font-size: 12px; color: #64748b; margin-bottom: 20px;">※削除すると名簿データも消失します。</p>
            <div class="form-group">
                <label for="del-event-select">削除するイベントを選択</label>
                <select id="del-event-select"><option value="">-- 読み込み中 --</option></select>
            </div>
            <button onclick="confirmDelete()" id="btn-delete" class="submit-btn" style="background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 4px 12px rgba(239,68,68,0.2);">選択したイベントを完全に削除</button>
        </div>

        <!-- セクション3: 削除完了パネル -->
        <div id="delete-success-panel" class="admin-card hidden">
            <div class="success-overlay">
                <div class="success-icon">✓</div>
                <h2 style="border:none; color:#ef4444;">削除が完了しました</h2>
                <p style="font-size:14px; color:#475569;">最新のリストに更新しています...<br>そのままお待ちください。</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwrmOKZVW_XtE7oJB7w6iasacuHYmwxVakU78TrpXRJxRkVt0zjTxUZ4Ym7_LtHvsMn/exec';

        window.onload = function() {
            loadAllServerData();
        };

        function loadAllServerData() {
            fetch(GAS_API_URL + '?action=getUniqueEventNames')
                .then(r => r.json()).then(names => renderSelect('event-name-sel', names)).catch(console.error);
            fetch(GAS_API_URL + '?action=getUniqueGuests')
                .then(r => r.json()).then(guests => renderSelect('event-guest-sel', guests)).catch(console.error);
            fetch(GAS_API_URL + '?action=getUniqueVenues')
                .then(r => r.json()).then(venues => renderSelect('event-venue-sel', venues)).catch(console.error);
            fetch(GAS_API_URL + '?action=getUniqueDetails')
                .then(r => r.json()).then(details => renderDetailSelect(details)).catch(console.error);
            fetch(GAS_API_URL + '?action=getAllEventsListForAdmin')
                .then(r => r.json()).then(events => renderDeleteSelect(events)).catch(console.error);
            fetch(GAS_API_URL + '?action=getMailTimes')
                .then(r => r.json()).then(times => renderMailTimeGrid(times)).catch(console.error);
        }

        // ── メール送信時刻 UI ──────────────────────────────
        const MAIL_TIME_KEYS = ['d7before','d3before','d1before','sameday','d7after'];

        function renderMailTimeGrid(times) {
            MAIL_TIME_KEYS.forEach(key => {
                const wrap = document.getElementById('mt-' + key);
                if (!wrap) return;
                const hour = (times && times[key] != null) ? times[key] : (key === 'sameday' ? 22 : 18);
                wrap.innerHTML =
                    '<button class="mail-time-chip" onclick="openTimePicker(\'' + key + '\')">' + hour + ':00</button>' +
                    '<select class="mail-time-select" id="mts-' + key + '" style="display:none" onchange="saveMailTime(\'' + key + '\',this.value)">' +
                    [...Array(24)].map((_,i)=>'<option value="'+i+'"'+(i===parseInt(hour)?' selected':'')+'>'+i+':00</option>').join('') +
                    '</select>';
            });
        }

        function openTimePicker(key) {
            MAIL_TIME_KEYS.forEach(k => {
                const s = document.getElementById('mts-' + k);
                if (s) s.style.display = 'none';
            });
            const sel = document.getElementById('mts-' + key);
            if (sel) sel.style.display = 'block';
        }

        function saveMailTime(key, hour) {
            const sel = document.getElementById('mts-' + key);
            if (sel) sel.style.display = 'none';
            const wrap = document.getElementById('mt-' + key);
            const btn = wrap ? wrap.querySelector('.mail-time-chip') : null;
            if (btn) btn.textContent = hour + ':00';
            fetch(GAS_API_URL + '?action=setMailTime&key=' + key + '&hour=' + hour)
                .then(r => r.json())
                .then(data => { if (data.error) alert('エラー: ' + data.error); })
                .catch(console.error);
        }

        function renderSelect(selId, items) {
            const sel = document.getElementById(selId);
            if (!sel || !Array.isArray(items)) return;
            sel.innerHTML = '<option value="">-- 選択してください --</option>';
            items.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                sel.appendChild(opt);
            });
            const newOpt = document.createElement('option');
            newOpt.value = '__new__';
            newOpt.textContent = '＋ 新規入力';
            sel.appendChild(newOpt);
        }

        function handleSelectChange(selId, inputId) {
            const sel = document.getElementById(selId);
            const inp = document.getElementById(inputId);
            if (sel.value === '__new__') {
                inp.style.display = 'block';
                inp.required = true;
                inp.focus();
            } else {
                inp.style.display = 'none';
                inp.required = false;
                inp.value = '';
            }
        }

        function getFieldValue(selId, inputId) {
            const sel = document.getElementById(selId);
            if (sel.value === '__new__') {
                return document.getElementById(inputId).value.trim();
            }
            return sel.value;
        }

        function renderDetailSelect(details) {
            const sel = document.getElementById('detail-template-select');
            if (!sel || !Array.isArray(details)) return;
            sel.innerHTML = '<option value="">-- 過去の説明文を反映させる場合は選択（任意） --</option>';
            details.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d.length > 40 ? d.substring(0, 40) + '...' : d;
                sel.appendChild(opt);
            });
        }

        function renderDeleteSelect(events) {
            const sel = document.getElementById('del-event-select');
            if (!sel) return;
            sel.innerHTML = '<option value="">-- 選択してください --</option>';
            if (!Array.isArray(events) || events.length === 0) {
                sel.innerHTML = '<option value="">イベントがありません</option>';
                return;
            }
            events.forEach(ev => {
                const opt = document.createElement('option');
                opt.value = ev.sheetName;
                opt.textContent = ev.radioLabel;
                sel.appendChild(opt);
            });
        }

        function applyDetailTemplate() {
            const val = document.getElementById('detail-template-select').value;
            if (val) document.getElementById('event-details').value = val;
        }

        function preventStandardSubmit(e) { e.preventDefault(); }

        function submitWithAnimation(animType) {
            const name = getFieldValue('event-name-sel', 'event-name-new');
            const date = document.getElementById('event-date').value;
            const openTime = document.getElementById('open-time').value;
            const startTime = document.getElementById('start-time').value;
            const venue = getFieldValue('event-venue-sel', 'event-venue-new');
            const guest = getFieldValue('event-guest-sel', 'event-guest-new');
            const details = document.getElementById('event-details').value.trim();
            const showNote = document.getElementById('event-shownote').value;

            if (!name || !date || !openTime || !startTime || !venue || !guest) {
                alert('すべての必須項目を入力してください。');
                return;
            }

            document.querySelectorAll('.btn-anim-choice').forEach(b => b.disabled = true);
            document.getElementById('loading-msg').style.display = 'block';

            const params = new URLSearchParams({
                action: 'createNewEvent',
                eventName: name,
                date: date,
                openTime: openTime,
                startTime: startTime,
                venue: venue,
                guest: guest,
                details: details,
                animation: animType,
                showNote: showNote
            });

            fetch(GAS_API_URL + '?' + params.toString())
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading-msg').style.display = 'none';
                    if (data.error) {
                        alert('エラー: ' + data.error);
                        document.querySelectorAll('.btn-anim-choice').forEach(b => b.disabled = false);
                    } else {
                        alert('✅ ' + data.message);
                        document.getElementById('event-form').reset();
                        document.querySelectorAll('.btn-anim-choice').forEach(b => b.disabled = false);
                        loadAllServerData();
                    }
                })
                .catch(err => {
                    document.getElementById('loading-msg').style.display = 'none';
                    alert('送信エラー: ' + err.message);
                    document.querySelectorAll('.btn-anim-choice').forEach(b => b.disabled = false);
                });
        }

        function confirmDelete() {
            const sel = document.getElementById('del-event-select');
            const sheetName = sel.value;
            if (!sheetName) { alert('削除するイベントを選択してください。'); return; }

            const label = sel.options[sel.selectedIndex].textContent;
            if (!confirm(`「${label}」を完全に削除しますか？\n※名簿データも消失します。この操作は取り消せません。`)) return;

            document.getElementById('btn-delete').disabled = true;
            document.getElementById('btn-delete').textContent = '削除中...';

            const params = new URLSearchParams({ action: 'deleteEvent', sheetName: sheetName });
            fetch(GAS_API_URL + '?' + params.toString())
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        alert('エラー: ' + data.error);
                        document.getElementById('btn-delete').disabled = false;
                        document.getElementById('btn-delete').textContent = '選択したイベントを完全に削除';
                    } else {
                        document.getElementById('delete-section').classList.add('hidden');
                        document.getElementById('delete-success-panel').classList.remove('hidden');
                        setTimeout(() => {
                            document.getElementById('delete-section').classList.remove('hidden');
                            document.getElementById('delete-success-panel').classList.add('hidden');
                            document.getElementById('btn-delete').disabled = false;
                            document.getElementById('btn-delete').textContent = '選択したイベントを完全に削除';
                            loadAllServerData();
                        }, 2500);
                    }
                })
                .catch(err => {
                    alert('削除エラー: ' + err.message);
                    document.getElementById('btn-delete').disabled = false;
                    document.getElementById('btn-delete').textContent = '選択したイベントを完全に削除';
                });
        }
    </script>
</body></html>
